services:
  db:
    image: postgis/postgis:15-3.4
    container_name: etp_platform_db
    volumes:
      - /home/jojo/etp_postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: etp_platform_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-etp_redis_secret}
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-etp_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  minio:
    image: minio/minio:latest
    container_name: etp_platform_minio
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      # Console desactivee en prod — accessible via port 9001 en local uniquement
      - "127.0.0.1:9001:9001"
    command: server /data --console-address ":9001"
    restart: always
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  api:
    build: .
    container_name: etp_platform_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  celery_worker:
    build: .
    container_name: etp_platform_celery_worker
    command: celery -A src.core.celery_app.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512M

  flower:
    build: .
    container_name: etp_platform_flower
    command: celery -A src.core.celery_app.celery_app flower --port=5555
    env_file:
      - .env
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      - redis
      - celery_worker
    restart: on-failure

volumes:
  postgres_data:
  minio_data:
